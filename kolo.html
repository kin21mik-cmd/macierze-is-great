<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 Koło Fortuny - Algebra Games</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e7, #d6f0ff, #fff2c9);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

h1 {
    font-size: 45px;
    color: #444;
    margin-bottom: 10px;
    z-index: 10;
}

/* Kontener na koło i kurczaki */
.game-container {
    position: relative;
    width: 450px;
    height: 450px;
    margin-bottom: 25px;
    z-index: 10;
}

/* Koło fortuny */
.wheel-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
}

canvas {
    border-radius: 50%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    transition: transform 4s cubic-bezier(0.1, 0.8, 0.3, 1);
}

/* Strzałka wskazująca */
.arrow {
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 30px solid #444;
    z-index: 20;
}

/* Przyciski i formularze */
.btn {
    background-color: #b39ddb; /* Pastelowy fiolet */
    color: white;
    border: none;
    padding: 15px 35px;
    font-size: 22px;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.2s;
    z-index: 10;
}

.btn:hover {
    transform: scale(1.05);
    background-color: #9575cd;
}

.btn:disabled {
    background-color: #ccc;
    cursor: not-allowed;
}

/* Okienko z pytaniem */
.modal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 30px;
    border-radius: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    z-index: 100;
    width: 380px;
}

.modal h3 {
    margin-top: 0;
    color: #444;
    font-size: 24px;
}

.modal input {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    border: 2px solid #ddd;
    border-radius: 15px;
    margin-top: 15px;
    text-align: center;
    outline: none;
}

.modal input:focus {
    border-color: #b39ddb;
}

.feedback {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}

.correct { color: #2ecc71; }
.wrong { color: #e74c3c; }

/* Chodzące kurczaczki 🐔 */
.walking-chicken {
    position: absolute;
    font-size: 25px;
    user-select: none;
    z-index: 1;
    animation: walk around linear infinite;
}

@keyframes walk {
    0% { transform: translate(0, 0) scaleX(1); }
    25% { transform: translate(40px, -20px) scaleX(1); }
    50% { transform: translate(80px, 0) scaleX(-1); }
    75% { transform: translate(40px, 20px) scaleX(-1); }
    100% { transform: translate(0, 0) scaleX(1); }
}

/* Przycisk powrotu */
.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    color: #555;
    text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
</style>
</head>
    </body>
    </html>
