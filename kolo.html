<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>🎡 Koło Fortuny – Macierze (Gauss-Jordan)</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe0f0,#e0f7fa,#fff3cd);
    text-align:center;
    overflow:hidden;
}

/* TYTUŁ */
h1{
    margin-top:20px;
    color:#444;
}

/* KOŁO */
#wheel {
    margin-top:20px;
    border-radius:50%;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    transition: transform 5s cubic-bezier(0.1,0.8,0.2,1);
}

/* STRZAŁKA */
.arrow {
    width: 0;
    height: 0;
    margin: 0 auto;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 30px solid #ff6b81;
}

/* PRZYCISK */
button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:20px;
    background:#ffb6c1;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
    background:#ff9aa2;
}

/* PYTANIE */
#question{
    margin-top:20px;
    font-size:20px;
    color:#333;
    min-height:60px;
}

/* KURCZAKI */
.chicken{
    position:absolute;
    font-size:22px;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(10deg); }
    100% { transform: translateY(0px) rotate(0deg); }
}
</style>
</head>

<body>

<h1>🎡 Koło Fortuny – Gauss-Jordan</h1>
<div class="arrow"></div>

<canvas id="wheel" width="350" height="350"></canvas>

<br>
<button onclick="spin()">🎲 Losuj pytanie</button>

<div id="question">Kliknij, aby wylosować zadanie z macierzy</div>

<script>
// ===== ZADANIA =====
const tasks = [
"Rozwiąż układ: x + y = 5, x - y = 1 (Gauss-Jordan)",
"Zredukuj macierz 2x2 do postaci schodkowej",
"Rozwiąż układ: 2x + y = 7, x + y = 4",
"Wyznacz macierz odwrotną (2x2)",
"Zastosuj eliminację Gaussa do układu 3 równań",
"Sprawdź czy macierz jest odwracalna (determinant)",
"Zredukuj układ do RREF (postać zredukowana)"
];

const colors = [
"#ffadad","#ffd6a5","#fdffb6","#caffbf",
"#9bf6ff","#a0c4ff","#ffc6ff"
];

// ===== RYSOWANIE KOŁA =====
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const size = canvas.width;
const radius = size/2;

let angle = 0;

function drawWheel(){
    const step = (2*Math.PI)/tasks.length;

    for(let i=0;i<tasks.length;i++){
        ctx.beginPath();
        ctx.moveTo(radius,radius);
        ctx.fillStyle = colors[i];
        ctx.arc(radius,radius,radius,i*step+angle,(i+1)*step+angle);
        ctx.fill();

        ctx.save();
        ctx.translate(radius,radius);
        ctx.rotate(i*step+step/2+angle);
        ctx.textAlign="right";
        ctx.fillStyle="#333";
        ctx.font="14px Arial";
        ctx.fillText(i+1, radius-10, 5);
        ctx.restore();
    }
}

function render(){
    ctx.clearRect(0,0,size,size);
    drawWheel();
}

// ===== LOSOWANIE =====
function spin(){
    const index = Math.floor(Math.random()*tasks.length);

    const spinAngle = 360*5 + (index * (360/tasks.length));
    canvas.style.transform = `rotate(${spinAngle}deg)`;

    setTimeout(()=>{
        document.getElementById("question").innerText = tasks[index];
    },5000);
}

render();

// ===== KURCZAKI =====
function createChick(){
    const chick = document.createElement("div");
    chick.className = "chicken";
    chick.innerText = "🐥";

    chick.style.left = Math.random()*window.innerWidth + "px";
    chick.style.top = Math.random()*window.innerHeight + "px";
    chick.style.animationDuration = (3+Math.random()*3)+"s";

    document.body.appendChild(chick);
}

for(let i=0;i<15;i++){
    createChick();
}
</script>

</body>
</html>
