<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>🎡 Koło Fortuny – Macierze (Gauss-Jordan)</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe0f0,#e0f7fa,#fff3cd);
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:20px;
    color:#444;
}

#wheel {
    margin-top:20px;
    border-radius:50%;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    transition: transform 5s cubic-bezier(0.1,0.8,0.2,1);
}

.arrow {
    width: 0;
    height: 0;
    margin: 0 auto;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 30px solid #ff6b81;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:20px;
    background:#ffb6c1;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
    background:#ff9aa2;
}

#question{
    margin-top:20px;
    font-size:20px;
    color:#333;
    min-height:60px;
}

.chicken{
    position:absolute;
    font-size:22px;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(10deg); }
    100% { transform: translateY(0px) rotate(0deg); }
}
</style>
</head>

<body>

<h1>🎡 Koło Fortuny – Gauss-Jordan</h1>
<div class="arrow"></div>

<canvas id="wheel" width="350" height="350"></canvas>

<br>
<button onclick="spin()">🎲 Losuj pytanie</button>

<div id="question">Kliknij, aby wylosować pytanie</div>

<script>
// ===== NOWE PYTANIA =====
const tasks = [
"Podaj warunek istnienia rozwiązania: r(A|b) = r(A)",
"Ile rozwiązań gdy r(A|b) = r(A) = n?",
"Ile rozwiązań gdy r(A|b) = r(A) < n?",
"Co oznacza r(A)? (rząd macierzy)",
"Co oznacza r(A|b)?",
"Kiedy układ nie ma rozwiązania? (r(A|b) ≠ r(A))",
"Jaką metodą rozwiązujemy układy? (Gauss-Jordana)",
"Do jakiej postaci redukujemy macierz? (RREF)",
"Co to jest macierz rozszerzona?",
"Ile parametrów gdy r < n? (n − r)",
"Rozwiąż: 3x + 2y = 7, 5x − y = 4",
"Rozwiąż układ 3 równań metodą Gaussa-Jordana",
"Wyznacz macierz odwrotną metodą Gaussa-Jordana",
"Na czym polega eliminacja Gaussa-Jordana?",
"Co oznacza liczba n? (liczba niewiadomych)"
];

const colors = [
"#ffadad","#ffd6a5","#fdffb6","#caffbf",
"#9bf6ff","#a0c4ff","#ffc6ff","#d0bdf4",
"#ffd3b6","#c2f0c2","#87cefa","#f7a8b8",
"#fce38a","#95e1d3","#f38181"
];

// ===== RYSOWANIE KOŁA =====
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const size = canvas.width;
const radius = size/2;

let angle = 0;

function drawWheel(){
    const step = (2*Math.PI)/tasks.length;

    for(let i=0;i<tasks.length;i++){
        ctx.beginPath();
        ctx.moveTo(radius,radius);
        ctx.fillStyle = colors[i % colors.length];
        ctx.arc(radius,radius,radius,i*step+angle,(i+1)*step+angle);
        ctx.fill();

        ctx.save();
        ctx.translate(radius,radius);
        ctx.rotate(i*step+step/2+angle);
        ctx.textAlign="right";
        ctx.fillStyle="#333";
        ctx.font="14px Arial";
        ctx.fillText(i+1, radius-10, 5);
        ctx.restore();
    }
}

function render(){
    ctx.clearRect(0,0,size,size);
    drawWheel();
}

// ===== LOSOWANIE =====
function spin(){
    const index = Math.floor(Math.random()*tasks.length);

    const spinAngle = 360*5 + (index * (360/tasks.length));
    canvas.style.transform = `rotate(${spinAngle}deg)`;

    setTimeout(()=>{
        document.getElementById("question").innerText = tasks[index];
    },5000);
}

render();

// ===== KURCZAKI =====
function createChick(){
    const chick = document.createElement("div");
    chick.className = "chicken";
    chick.innerText = "🐥";

    chick.style.left = Math.random()*window.innerWidth + "px";
    chick.style.top = Math.random()*window.innerHeight + "px";
    chick.style.animationDuration = (3+Math.random()*3)+"s";

    document.body.appendChild(chick);
}

for(let i=0;i<15;i++){
    createChick();
}
</script>

</body>
</html>
