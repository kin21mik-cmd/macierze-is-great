<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>🎡 Koło Fortuny – Gauss-Jordan</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe0f0,#e0f7fa,#fff3cd);
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:20px;
    color:#444;
}

#wheel {
    margin-top:20px;
    border-radius:50%;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    transition: transform 5s cubic-bezier(0.1,0.8,0.2,1);
}

.arrow {
 
width: 0;
    height: 0;
    margin: 0 auto;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 30px solid #ff6b81;
}

}

button{
    margin-top:15px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:20px;
    background:#ffb6c1;
    cursor:pointer;
}

button:hover{
    background:#ff9aa2;
}

#question{
    margin-top:20px;
    font-size:20px;
}

#answer{
    margin-top:10px;
    font-size:18px;
    color:#2f4f4f;
}

#matrixImg{
    display:none;
    margin-top:15px;
    max-width:300px;
}

.chicken{
    position:absolute;
    font-size:22px;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<h1>🎡 Koło Fortuny – Gauss-Jordan</h1>
<div class="arrow"></div>

<canvas id="wheel" width="350" height="350"></canvas>

<br>
<button onclick="spin()">🎲 Losuj pytanie</button>
<br>
<button onclick="showAnswer()">📖 Pokaż odpowiedź</button>

<div id="question">Kliknij, aby wylosować pytanie</div>
<div id="answer"></div>

<img id="matrixImg">

<script>
// ===== PYTANIA POPRAWIONE =====
const tasks = [
{q:"Kiedy układ równań ma rozwiązanie?", a:"gdy r(A|b) = r(A)"},
{q:"Ile rozwiązań gdy r(A|b) = r(A) = n?", a:"jedno rozwiązanie"},
{q:"Ile rozwiązań gdy r(A|b) = r(A) < n?", a:"nieskończenie wiele"},
{q:"Na czym polega metoda Gaussa-Jordana?", a:"sprowadzamy macierz do postaci RREF zerując elementy nad i pod pivotami"},
{q:"Co oznacza r(A)?", a:"rząd macierzy"},
{q:"Co oznacza r(A|b)?", a:"rząd macierzy z wynikami"},
{q:"Kiedy układ nie ma rozwiązania?", a:"gdy r(A|b) ≠ r(A)"},
{q:"Co robimy z macierzą w metodzie Gaussa-Jordana?", a:"upraszczamy ją aż dostaniemy postać schodkową"},
{q:"Po co stosujemy metodę Gaussa-Jordana?", a:"aby znaleźć wartości niewiadomych x, y, z"},

// ✅ ZADANIE Z OBRAZKIEM
{
 q:"Rozwiąż układ (3x3) z obrazka metodą Gaussa-Jordana",
 a:"doprowadź macierz do RREF i odczytaj wartości x, y, z",
 img:"macierz.png"
}
];

const colors = [
"#ffadad","#ffd6a5","#fdffb6","#caffbf",
"#9bf6ff","#a0c4ff","#ffc6ff","#d0bdf4"
];

// ===== KOŁO =====
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const radius = canvas.width/2;

let currentRotation = 0;
let currentIndex = null;

function drawWheel(){
    const step = (2*Math.PI)/tasks.length;

    for(let i=0;i<tasks.length;i++){
        ctx.beginPath();
        ctx.moveTo(radius,radius);
        ctx.fillStyle = colors[i % colors.length];
        ctx.arc(radius,radius,radius,i*step,(i+1)*step);
        ctx.fill();

        ctx.save();
        ctx.translate(radius,radius);
        ctx.rotate(i*step+step/2);
        ctx.textAlign="right";
        ctx.fillStyle="#333";
        ctx.fillText(i+1, radius-10, 5);
        ctx.restore();
    }
}

drawWheel();

// ===== LOSOWANIE =====
function spin(){
   
  currentIndex = Math.floor(Math.random()*tasks.length);

    const sliceAngle = 360 / tasks.length;
    const extraSpins = 360 * 5;
    const randomOffset = Math.random() * sliceAngle;

    currentRotation += extraSpins + currentIndex*sliceAngle + randomOffset;

    canvas.style.transform = `rotate(${currentRotation}deg)`;

    // 🔥 NOWE: czyszczenie od razu
    document.getElementById("question").innerText = "Losowanie...";
    document.getElementById("answer").innerText = "";
    document.getElementById("matrixImg").style.display = "none";

    setTimeout(()=>{
        document.getElementById("question").innerText = tasks[currentIndex].q;

        if(tasks[currentIndex].img){
            const img = document.getElementById("matrixImg");
            img.src = tasks[currentIndex].img;
            img.style.display = "block";
        }
    },5000);
}
``


// ===== ODPOWIEDŹ =====
function showAnswer(){
    if(currentIndex !== null){
        document.getElementById("answer").innerText =
        "✅ " + tasks[currentIndex].a;
    }
}

// ===== KURCZAKI 🐥 =====
function createChick(){
    const chick = document.createElement("div");
    chick.className = "chicken";
    chick.innerText = "🐥";

    chick.style.left = Math.random()*window.innerWidth + "px";
    chick.style.top = Math.random()*window.innerHeight + "px";

    document.body.appendChild(chick);
}

for(let i=0;i<12;i++){
    createChick();
}
</script>

</body>
</html>
