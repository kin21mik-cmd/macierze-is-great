<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>🎡 Koło Fortuny – Gauss-Jordan</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe0f0,#e0f7fa,#fff3cd);
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:20px;
    color:#444;
}

#wheel{
    margin-top:20px;
    border-radius:50%;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    transition: transform 5s cubic-bezier(0.1,0.8,0.2,1);
}

.arrow{
    width:0;
    height:0;
    margin:0 auto;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:30px solid #ff6b81;
}

button{
    margin-top:20px;
    padding:15px 35px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:30px;
    cursor:pointer;
    color:white;
    box-shadow:0 6px 15px rgba(0,0,0,0.25);
    transition:all .3s ease;
}

.spin{
    background:linear-gradient(135deg,#36d1dc,#5b86e5);
}

.answerBtn{
    background:linear-gradient(135deg,#f7971e,#ffd200);
    color:#333;
}

button:hover{
    transform:scale(1.1);
}

#question{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

#answer{
    margin-top:10px;
    font-size:18px;
    color:#2f4f4f;
}

#matrixImg{
    display:none;
    margin-top:15px;
    max-width:350px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
    background:white;
}

.chicken{
    position:absolute;
    font-size:22px;
    animation: float 4s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
    100%{transform:translateY(0)}
}
</style>
</head>

<body>

<h1>🎡 Koło Fortuny – Gauss-Jordan</h1>

<div class="arrow"></div>

<canvas id="wheel" width="350" height="350"></canvas>

<br>

<button class="spin" onclick="spin()">🎲 Losuj pytanie</button>
<br>
<button class="answerBtn" onclick="showAnswer()">📖 Pokaż odpowiedź</button>

<div id="question">
Kliknij, aby wylosować pytanie
</div>

<div id="answer"></div>

<img id="matrixImg">

<script>

// ====== MACIERZ JAKO OBRAZEK SVG ======
const matrixSVG = `
<svg xmlns="http://www.w3.org/2000/svg" width="350" height="180">
<rect width="100%" height="100%" fill="white"/>

<text x="40" y="70" font-size="40">[</text>
<text x="300" y="70" font-size="40">]</text>

<text x="70" y="50" font-size="24">1</text>
<text x="120" y="50" font-size="24">2</text>
<text x="170" y="50" font-size="24">1</text>

<text x="70" y="90" font-size="24">2</text>
<text x="120" y="90" font-size="24">1</text>
<text x="170" y="90" font-size="24">-1</text>

<text x="70" y="130" font-size="24">3</text>
<text x="120" y="130" font-size="24">1</text>
<text x="170" y="130" font-size="24">1</text>

<line x1="220" y1="25" x2="220" y2="145"
stroke="black" stroke-width="2"/>

<text x="250" y="50" font-size="24">8</text>
<text x="250" y="90" font-size="24">3</text>
<text x="250" y="130" font-size="24">10</text>
</svg>
`;

const matrixData =
"data:image/svg+xml;charset=utf-8," +
encodeURIComponent(matrixSVG);

// ===== PYTANIA =====
const tasks = [
{q:"Kiedy układ równań ma rozwiązanie?",a:"gdy r(A|b)=r(A)"},
{q:"Ile rozwiązań gdy r(A|b)=r(A)=n?",a:"jedno rozwiązanie"},
{q:"Ile rozwiązań gdy r(A|b)=r(A)<n?",a:"nieskończenie wiele"},
{q:"Na czym polega metoda Gaussa-Jordana?",a:"sprowadzamy macierz do RREF"},
{q:"Co oznacza r(A)?",a:"rząd macierzy"},
{q:"Co oznacza r(A|b)?",a:"rząd macierzy rozszerzonej"},
{q:"Kiedy układ nie ma rozwiązania?",a:"gdy r(A|b) ≠ r(A)"},
{q:"Co robimy z macierzą?",a:"upraszczamy ją do postaci schodkowej"},
{q:"Po co stosujemy metodę?",a:"aby wyznaczyć niewiadome"},
{
q:"Rozwiąż układ z obrazka metodą Gaussa-Jordana",
a:"Wynik: x = 1, y = 2, z = 3",
img: matrixData
}
];

const colors = [
"#ffadad","#ffd6a5","#fdffb6","#caffbf",
"#9bf6ff","#a0c4ff","#ffc6ff","#d0bdf4"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const radius = canvas.width/2;

let currentRotation = 0;
let currentIndex = null;

function drawWheel(){

const step = (2*Math.PI)/tasks.length;

for(let i=0;i<tasks.length;i++){

ctx.beginPath();
ctx.moveTo(radius,radius);

ctx.fillStyle = colors[i % colors.length];

ctx.arc(
radius,
radius,
radius,
i*step,
(i+1)*step
);

ctx.fill();

ctx.save();
ctx.translate(radius,radius);
ctx.rotate(i*step+step/2);

ctx.textAlign="right";
ctx.fillStyle="#333";
ctx.font="18px Arial";
ctx.fillText(i+1,radius-15,5);

ctx.restore();
}
}

drawWheel();

function spin(){

currentIndex = Math.floor(Math.random()*tasks.length);

const sliceAngle = 360/tasks.length;
const extraSpins = 360*5;

currentRotation +=
extraSpins +
currentIndex*sliceAngle +
Math.random()*sliceAngle;

canvas.style.transform =
`rotate(${currentRotation}deg)`;

document.getElementById("question").innerText =
"🎡 Losowanie...";

document.getElementById("answer").innerText="";

document.getElementById("matrixImg").style.display =
"none";

setTimeout(()=>{

document.getElementById("question").innerText =
tasks[currentIndex].q;

if(tasks[currentIndex].img){

const img =
document.getElementById("matrixImg");

img.src = tasks[currentIndex].img;
img.style.display = "block";
}

},5000);
}

function showAnswer(){

if(currentIndex!==null){

document.getElementById("answer").innerText =
"✅ " + tasks[currentIndex].a;
}
}

function createChick(){

const chick =
document.createElement("div");

chick.className = "chicken";
chick.innerText = "🐥";

chick.style.left =
Math.random()*window.innerWidth+"px";

chick.style.top =
Math.random()*window.innerHeight+"px";

document.body.appendChild(chick);
}

for(let i=0;i<12;i++){
createChick();
}

</script>

</body>
</html>
