```html
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 Koło Fortuny – Gauss-Jordan</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffe0f0,#e0f7fa,#fff3cd);
    text-align:center;
    overflow-x:hidden;
}

h1{
    margin-top:20px;
    color:#444;
}

.arrow{
    width:0;
    height:0;
    margin:10px auto;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:30px solid #ff6b81;
}

#wheel{
    border-radius:50%;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    transition:transform 5s cubic-bezier(.1,.8,.2,1);
}

button{
    margin-top:15px;
    padding:15px 35px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:30px;
    cursor:pointer;
    color:white;
    box-shadow:0 6px 15px rgba(0,0,0,.25);
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.spin{
    background:linear-gradient(135deg,#36d1dc,#5b86e5);
}

.answerBtn{
    background:linear-gradient(135deg,#f7971e,#ffd200);
    color:#333;
}

#question{
    margin-top:25px;
    font-size:22px;
    font-weight:bold;
    color:#333;
}

#answer{
    margin-top:15px;
    font-size:20px;
    color:#1b5e20;
    font-weight:bold;
}

#matrixBox{
    display:none;
    margin-top:20px;
}

#matrixBox pre{
    background:white;
    padding:20px;
    border-radius:15px;
    display:inline-block;
    box-shadow:0 4px 15px rgba(0,0,0,.2);
    font-size:24px;
    line-height:1.6;
}

.chicken{
    position:absolute;
    font-size:22px;
    animation:float 4s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}
</style>
</head>

<body>

<h1>🎡 Koło Fortuny – Gauss-Jordan</h1>

<div class="arrow"></div>

<canvas id="wheel" width="350" height="350"></canvas>

<br>

<button class="spin" onclick="spin()">🎲 Losuj pytanie</button>
<br>
<button class="answerBtn" onclick="showAnswer()">📖 Pokaż odpowiedź</button>

<div id="question">
Kliknij „Losuj pytanie”
</div>

<div id="answer"></div>

<div id="matrixBox">
<pre>
| 1   1   1 |  6 |
| 2  -1   1 |  3 |
| 1   2  -1 |  2 |
</pre>
</div>

<script>

const tasks = [

{
nr:1,
q:"Kiedy układ równań jest oznaczony?",
a:"Gdy r(A)=r(A|b)=n."
},

{
nr:2,
q:"Kiedy układ nie ma rozwiązania?",
a:"Gdy r(A) ≠ r(A|b)."
},

{
nr:3,
q:"Kiedy układ ma nieskończenie wiele rozwiązań?",
a:"Gdy r(A)=r(A|b)<n."
},

{
nr:4,
q:"Na czym polega metoda Gaussa-Jordana?",
a:"Na sprowadzeniu macierzy rozszerzonej do zredukowanej postaci schodkowej (RREF)."
},

{
nr:5,
q:"Jaki warunek musi spełniać macierz, aby była odwracalna?",
a:"Wyznacznik macierzy musi być różny od zera."
},

{
nr:6,
q:"Co oznacza rząd macierzy?",
a:"Liczbę liniowo niezależnych wierszy lub kolumn."
},

{
nr:7,
q:"Rozwiąż układ metodą Gaussa-Jordana.",
a:"x = 1, y = 2, z = 3",
matrix:true
}

];

const colors = [
"#ffadad",
"#ffd6a5",
"#fdffb6",
"#caffbf",
"#9bf6ff",
"#a0c4ff",
"#ffc6ff"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const radius = canvas.width / 2;

let currentRotation = 0;
let currentIndex = null;

function drawWheel(){

ctx.clearRect(0,0,canvas.width,canvas.height);

const step = (2 * Math.PI) / tasks.length;

for(let i = 0; i < tasks.length; i++){

ctx.beginPath();
ctx.moveTo(radius,radius);

ctx.fillStyle = colors[i];

ctx.arc(
radius,
radius,
radius,
i * step,
(i + 1) * step
);

ctx.fill();

ctx.save();

ctx.translate(radius,radius);
ctx.rotate(i * step + step / 2);

ctx.textAlign = "right";
ctx.fillStyle = "#333";
ctx.font = "bold 22px Arial";

ctx.fillText(tasks[i].nr, radius - 20, 8);

ctx.restore();
}
}

drawWheel();

function spin(){

currentIndex =
Math.floor(Math.random() * tasks.length);

const sliceAngle = 360 / tasks.length;

const targetAngle =
360 -
(currentIndex * sliceAngle + sliceAngle / 2);

currentRotation +=
360 * 5 +
targetAngle;

canvas.style.transform =
`rotate(${currentRotation}deg)`;

document.getElementById("question").innerHTML =
"🎡 Losowanie...";

document.getElementById("answer").innerHTML = "";

document.getElementById("matrixBox").style.display =
"none";

setTimeout(() => {

document.getElementById("question").innerHTML =
`<b>Pytanie ${tasks[currentIndex].nr}</b><br><br>${tasks[currentIndex].q}`;

if(tasks[currentIndex].matrix){
document.getElementById("matrixBox").style.display =
"block";
}

},5000);
}

function showAnswer(){

if(currentIndex === null) return;

document.getElementById("answer").innerHTML =
"✅ " + tasks[currentIndex].a;
}

function createChick(){

const chick =
document.createElement("div");

chick.className = "chicken";
chick.innerText = "🐥";

chick.style.left =
Math.random() * window.innerWidth + "px";

chick.style.top =
Math.random() * window.innerHeight + "px";

document.body.appendChild(chick);
}

for(let i = 0; i < 12; i++){
createChick();
}

</script>

</body>
</html>
