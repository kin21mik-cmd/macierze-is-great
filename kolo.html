
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 Koło Fortuny – Gauss Jordan</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffe0f0,#e0f7fa,#fff3cd);
    text-align:center;
}

h1{
    color:#444;
    margin-top:20px;
}

.arrow{
    width:0;
    height:0;
    margin:10px auto;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:35px solid red;
}

#wheel{
    border-radius:50%;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    transition:transform 5s cubic-bezier(.17,.67,.16,.99);
}

button{
    margin-top:15px;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
}

.spin{
    background:#4facfe;
    color:white;
}

.answerBtn{
    background:#ffd54f;
}

#question{
    margin-top:25px;
    font-size:24px;
    font-weight:bold;
}

#answer{
    margin-top:15px;
    font-size:20px;
    color:green;
}
</style>
</head>
<body>

<h1>🎡 Koło Fortuny – Gauss Jordan</h1>

<div class="arrow"></div>

<canvas id="wheel" width="500" height="500"></canvas>

<br>

<button class="spin" onclick="spin()">🎲 Losuj pytanie</button>
<br>
<button class="answerBtn" onclick="showAnswer()">📖 Pokaż odpowiedź</button>

<div id="question">
Kliknij „Losuj pytanie”
</div>

<div id="answer"></div>

<script>

const tasks = [

{nr:1,q:"Co oznacza r(A)?",a:"Rząd macierzy głównej A."},
{nr:2,q:"Co oznacza r(A|b)?",a:"Rząd macierzy rozszerzonej układu."},
{nr:3,q:"Co to jest macierz rozszerzona?",a:"Macierz główna z dołączoną kolumną wyrazów wolnych."},
{nr:4,q:"Na czym polega metoda Gaussa-Jordana?",a:"Na sprowadzeniu macierzy rozszerzonej do normalnej postaci schodkowej."},
{nr:5,q:"Po co stosujemy metodę Gaussa-Jordana?",a:"Aby rozwiązać układ równań liniowych."},
{nr:6,q:"Jakie operacje elementarne można wykonywać na wierszach?",a:"Zamiana wierszy, mnożenie wiersza przez liczbę różną od zera, dodanie wielokrotności jednego wiersza do drugiego."},
{nr:7,q:"Kiedy układ ma rozwiązanie?",a:"Gdy r(A)=r(A|b)."},
{nr:8,q:"Kiedy układ nie ma rozwiązania?",a:"Gdy r(A)≠r(A|b)."},
{nr:9,q:"Kiedy układ ma dokładnie jedno rozwiązanie?",a:"Gdy r(A)=r(A|b)=n."},
{nr:10,q:"Kiedy układ ma nieskończenie wiele rozwiązań?",a:"Gdy r(A)=r(A|b)<n."},
{nr:11,q:"Każdy układ jednorodny ma rozwiązanie — PRAWDA czy FAŁSZ?",a:"PRAWDA."},
{nr:12,q:"Układ sprzeczny ma rozwiązanie — PRAWDA czy FAŁSZ?",a:"FAŁSZ."},
{nr:13,q:"Można pomnożyć wiersz macierzy przez 0 — PRAWDA czy FAŁSZ?",a:"FAŁSZ."},
{nr:14,q:"Zamiana miejscami dwóch wierszy jest operacją elementarną — PRAWDA czy FAŁSZ?",a:"PRAWDA."},
{nr:15,q:"Macierz rozszerzona zawiera kolumnę wyrazów wolnych — PRAWDA czy FAŁSZ?",a:"PRAWDA."},
{nr:16,q:"Jeśli r(A)=2, r(A|b)=2 i n=2, ile rozwiązań ma układ?",a:"Jedno rozwiązanie, bo r(A)=r(A|b)=n."},
{nr:17,q:"Jeśli r(A)=2, r(A|b)=2 i n=4, ile rozwiązań ma układ?",a:"Nieskończenie wiele, bo r(A)=r(A|b)<n."},
{nr:18,q:"Jeśli r(A)=2, r(A|b)=3, czy układ ma rozwiązanie?",a:"Nie, bo r(A)≠r(A|b)."},
{nr:19,q:"Ile parametrów ma rozwiązanie, jeśli n=5 i r=3?",a:"2 parametry, bo n-r=2."},
{nr:20,q:"Co oznacza n w twierdzeniu Kroneckera-Capellego?",a:"Liczbę niewiadomych."}

];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const radius = canvas.width/2;

const colors = [
"#ffadad","#ffd6a5","#fdffb6","#caffbf",
"#9bf6ff","#a0c4ff","#bdb2ff","#ffc6ff"
];

let currentIndex = null;
let currentRotation = 0;

function drawWheel(){

const step = (2*Math.PI)/tasks.length;

for(let i=0;i<tasks.length;i++){

ctx.beginPath();
ctx.moveTo(radius,radius);

ctx.fillStyle = colors[i % colors.length];

ctx.arc(
radius,
radius,
radius,
i*step,
(i+1)*step
);

ctx.fill();

ctx.save();

ctx.translate(radius,radius);
ctx.rotate(i*step + step/2);

ctx.fillStyle="#333";
ctx.font="bold 18px Arial";
ctx.textAlign="right";

ctx.fillText(
tasks[i].nr,
radius-20,
5
);

ctx.restore();
}
}

drawWheel();

function spin(){

currentIndex =
Math.floor(Math.random()*tasks.length);

const sliceAngle =
360/tasks.length;

const stopAngle =
360 -
(currentIndex*sliceAngle + sliceAngle/2);

currentRotation +=
360*5 + stopAngle;

canvas.style.transform =
`rotate(${currentRotation}deg)`;

document.getElementById("question").innerHTML =
"🎡 Losowanie...";

document.getElementById("answer").innerHTML = "";

setTimeout(() => {

document.getElementById("question").innerHTML =
"<h2>Pytanie nr " +
tasks[currentIndex].nr +
"</h2>" +
tasks[currentIndex].q;

},5000);

}

function showAnswer(){

if(currentIndex === null){
return;
}

document.getElementById("answer").innerHTML =
"✅ " +
tasks[currentIndex].a;
}

</script>

</body>
</html>
