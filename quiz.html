<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Quiz – Wyznaczniki</title>

<style>
body{
    font-family:Arial;
    background:#bde0fe;
    text-align:center;
}

.question{
    background:white;
    margin:20px auto;
    padding:20px;
    width:500px;
    border-radius:10px;
}

button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:10px;
    cursor:pointer;
}

.correct{
    background:lightgreen;
}

.wrong{
    background:salmon;
}
</style>
</head>

<body>

<h1>🎯 Wyznaczniki macierzy 3×3</h1>

<div id="quiz"></div>
<h2 id="score">Wynik: 0</h2>

<script>

const questions = [

{
q: "det | 1 2 3 ; 0 4 5 ; 1 0 6 |",
answers: ["22","12","10","24"],
correct: 0
},

{
q: "det | 2 1 0 ; 3 -1 4 ; 1 2 1 |",
answers: ["3","5","1","7"],
correct: 0
},

{
q: "det | 0 2 1 ; 3 1 5 ; 2 4 0 |",
answers: ["-22","22","10","-10"],
correct: 0
},

{
q: "det | 4 2 1 ; 0 3 -2 ; 5 1 2 |",
answers: ["19","29","9","-19"],
correct: 0
}

];

let score = 0;
const quiz = document.getElementById("quiz");

questions.forEach(q => {

    const div = document.createElement("div");
    div.className = "question";

    const title = document.createElement("h3");
    title.innerText = q.q;
    div.appendChild(title);

    q.answers.forEach((a,i)=>{
        const btn = document.createElement("button");
        btn.innerText = a;

        btn.onclick = function(){

            const all = div.querySelectorAll("button");
            all.forEach(b => b.disabled = true);

            if(i === q.correct){
                btn.classList.add("correct");
                score++;
            } else {
                btn.classList.add("wrong");
                all[q.correct].classList.add("correct");
            }

            document.getElementById("score").innerText =
            "Wynik: " + score + " / " + questions.length;
        }

        div.appendChild(btn);
    });

    quiz.appendChild(div);
});

</script>

</body>
</html>
