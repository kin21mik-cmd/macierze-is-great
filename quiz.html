<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Quiz – Wyznaczniki</title>

<style>
body{
    font-family:Arial;
    background:#bde0fe;
    text-align:center;
}

.question{
    background:white;
    margin:20px auto;
    padding:20px;
    width:500px;
    border-radius:10px;
}

.det{
    display:inline-grid;
    grid-template-columns: repeat(3, 35px);
    gap:6px 10px;
    padding:8px 14px;
    border-left:3px solid black;
    border-right:3px solid black;
    font-size:22px;
    margin:10px 0;
}

.det span{
    text-align:center;
}

button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:10px;
    cursor:pointer;
}

.correct{
    background:lightgreen;
}

.wrong{
    background:salmon;
}
</style>
</head>

<body>

<h1>🎯 Wyznaczniki macierzy 3×3</h1>

<div id="quiz"></div>
<h2 id="score">Wynik: 0</h2>

<script>

const questions = [

{
q: [1,2,3, 0,4,5, 1,0,6],
answers: ["22","12","10","24"],
correct: 0
},

{
q: [2,1,0, 3,-1,4, 1,2,1],
answers: ["3","-17","1","7"],
correct: 1
},

{
q: [0,2,1, 3,1,5, 2,4,0],
answers: ["-22","22","30","-10"],
correct: 2
},

{
q: [4,2,1, 0,3,-2, 5,1,2],
answers: ["19","29","-3","-19"],
correct: 2
}

];

let score = 0;
const quiz = document.getElementById("quiz");

questions.forEach(q => {

    const div = document.createElement("div");
    div.className = "question";

    const title = document.createElement("h3");
    title.innerText = "Oblicz wyznacznik:";
    div.appendChild(title);

    const matrix = document.createElement("div");
    matrix.className = "det";

    q.q.forEach(number => {
        const span = document.createElement("span");
        span.innerText = number;
        matrix.appendChild(span);
    });

    div.appendChild(matrix);

    q.answers.forEach((a,i)=>{
        const btn = document.createElement("button");
        btn.innerText = a;

        btn.onclick = function(){

            const all = div.querySelectorAll("button");
            all.forEach(b => b.disabled = true);

            if(i === q.correct){
                btn.classList.add("correct");
                score++;
            } else {
                btn.classList.add("wrong");
                all[q.correct].classList.add("correct");
            }

            document.getElementById("score").innerText =
            "Wynik: " + score + " / " + questions.length;
        }

        div.appendChild(btn);
    });

    quiz.appendChild(div);
});

</script>

</body>
</html>
