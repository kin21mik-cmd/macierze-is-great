<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 Algebra Games</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#d6f0ff,#fff2c9);
    text-align:center;
}

/* Symbole matematyczne */

.symbol{
    position:absolute;
    color:#9b5de5; /* Pośredni fiolet */
    font-size:70px;
    font-weight:bold;
    opacity:0.8;
    text-shadow:
        0 0 10px rgba(155, 93, 229, 0.3),
        0 0 20px rgba(255, 255, 255, 0.6);
    animation:float 15s linear infinite;
    user-select:none;
}

@keyframes float{
    from{
        transform:translateY(110vh) rotate(0deg);
    }
    to{
        transform:translateY(-120px) rotate(360deg);
    }
}

/* Kurki 🐔 */

.chicken{
    font-size:40px;
    opacity:0.95;
    filter:drop-shadow(0 0 10px white);
}

h1{
    margin-top:40px;
    font-size:60px;
    color:#444;
    position:relative;
    z-index:10;
}

.container{
    margin-top:80px;
    position:relative;
    z-index:10;
}

.card{
    display:inline-block;
    width:280px;
    height:280px;
    margin:25px;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card:hover{
    transform:scale(1.08);
}

.icon{
    font-size:90px;
    margin-top:45px;
}

.title{
    font-size:36px;
    font-weight:bold;
    margin-top:25px;
    color:white;
}

/* Kolory */

.quiz{
    background:#ff8dc7;
}

.million{
    background:#7fb7ff;
}

.wheel{
    background:#ffb066;
}

</style>
</head>

<body>

<div class="symbol" style="left:5%; animation-duration:12s;">+</div>
<div class="symbol" style="left:12%; animation-duration:18s;">−</div>
<div class="symbol" style="left:20%; animation-duration:15s;">×</div>
<div class="symbol" style="left:28%; animation-duration:17s;">÷</div>
<div class="symbol" style="left:36%; animation-duration:14s;">∫</div>
<div class="symbol" style="left:44%; animation-duration:20s;">∂</div>
<div class="symbol" style="left:52%; animation-duration:13s;">Σ</div>
<div class="symbol" style="left:60%; animation-duration:19s;">Δ</div>
<div class="symbol" style="left:68%; animation-duration:16s;">λ</div>
<div class="symbol" style="left:76%; animation-duration:14s;">A⁻¹</div>
<div class="symbol" style="left:84%; animation-duration:18s;">det(A)</div>
<div class="symbol" style="left:92%; animation-duration:15s;">f'(x)</div>

<div class="symbol chicken" style="left:8%; animation-duration:25s;">🐔</div>
<div class="symbol chicken" style="left:30%; animation-duration:30s;">🐔</div>
<div class="symbol chicken" style="left:55%; animation-duration:27s;">🐔</div>
<div class="symbol chicken" style="left:80%; animation-duration:33s;">🐔</div>

<h1>🎓 Algebra Games</h1>

<div class="container">

<div class="card quiz" onclick="openPage('quiz.html')">
    <div class="icon">🎯</div>
    <div class="title">Quiz</div>
</div>

<div class="card million" onclick="openPage('milionerzy.html')">
    <div class="icon">💰</div>
    <div class="title">Milionerzy</div>
</div>

<div class="card wheel" onclick="openPage('kolo.html')">
    <div class="icon">🎡</div>
    <div class="title">Koło Fortuny</div>
</div>

</div>

<script>

function openPage(page){
    window.location.href = page;
}

</script>

</body>
</html>
