<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Milionerzy</title>

<style>

/* TŁO */
body{
    margin:0;
    background:#001a66;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* LATAJĄCE $ */
.money-bg span{
    position:absolute;
    color:gold;
    font-size:25px;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}

/* GŁÓWNY EKRAN */
.main{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* TYTUŁ */
h1{
    font-size:80px;
    color:gold;
    margin-bottom:30px;
}

/* PYTANIE */
.question{
    font-size:35px;
    margin-bottom:40px;
    max-width:900px;
    text-align:center;
}

/* ODPOWIEDZI */
.answers{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    width:80%;
    max-width:1000px;
}

.card{
    height:150px;
    font-size:26px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#002bcc;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
    text-align:center;
    padding:0 15px;
}

.card:hover{
    background:#0055ff;
    transform:scale(1.05);
}

.correct{background:green!important;}
.wrong{background:red!important;}

.money{
    margin-top:30px;
    font-size:30px;
    color:gold;
}

/* KOŁA */
.lifelines button{
    padding:15px 30px;
    font-size:18px;
    margin:10px;
    background:orange;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
}

/* EKRANY KOŃCOWE */
.end-screen{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:60px;
}

/* SMUTNE MINKI */
.sad span{
    position:absolute;
    font-size:30px;
    animation:sadFall linear infinite;
}
@keyframes sadFall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}

/* FAJERWERKI */
.firework{
    position:absolute;
    width:10px;
    height:10px;
    background:yellow;
    border-radius:50%;
    animation:explode 1s forwards;
}
@keyframes explode{
    0%{transform:scale(1);}
    100%{transform:scale(6);opacity:0;}
}

.chest{
    font-size:100px;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="money-bg"></div>

<div class="main">

<h1>💰 MILIONERZY 💰</h1>

<div class="lifelines">
<button onclick="use5050()">50/50</button>
<button onclick="friend()">📞 Przyjaciel</button>
</div>

<div class="question" id="question"></div>

<div class="answers">
<div id="a" class="card" onclick="answer(0)"></div>
<div id="b" class="card" onclick="answer(1)"></div>
<div id="c" class="card" onclick="answer(2)"></div>
<div id="d" class="card" onclick="answer(3)"></div>
</div>

<div class="money" id="money"></div>

</div>

<script>

/* LATAJĄCE $ */
for(let i=0;i<25;i++){
    let s=document.createElement("span");
    s.innerText="$";
    s.style.left=Math.random()*100+"%";
    s.style.animationDuration=(5+Math.random()*5)+"s";
    document.querySelector(".money-bg").appendChild(s);
}

let current=0;

const money=[
"100 zł","200 zł","500 zł","1000 zł",
"2000 zł","5000 zł","10000 zł","50000 zł",
"100000 zł","500000 zł","1000000 zł"
];

const questions=[ /* TWOJE (nie zmienione!) */
{
q:"Metoda Sarrusa służy do:",
answers:["Gaussa","transpozycji","mnożenia","wyznacznika 3x3"],
correct:3
},
{
q:"Jeśli det ≠ 0 to macierz:",
answers:["ma ∞ rozwiązań","zerowa","jest odwracalna","losowa"],
correct:2
},
{
q:"Metoda Gaussa polega na:",
answers:[
"sprowadzaniu do postaci schodkowej",
"transpozycji",
"mnożeniu macierzy",
"wyznaczaniu det 2x2"
],
correct:0
},
{
q:"Twierdzenie Kroneckera-Capellego mówi o:",
answers:[
"transpozycji",
"macierzy zerowej",
"liczbie rozwiązań układu równań",
"wyznaczniku"
],
correct:2
},
{
q:"Układ ma jedno rozwiązanie gdy:",
answers:[
"zawsze",
"det = 0",
"rzędy = liczbie niewiadomych",
"brak równań"
],
correct:2
},
{
q:"Metoda Gaussa–Jordana prowadzi macierz do postaci:",
answers:[
"schodkowej zredukowanej",
"zerowej",
"diagonalnej",
"symetrycznej"
],
correct:0
},
{
q:"W metodzie Gaussa–Jordana zerujemy elementy:",
answers:[
"tylko pod elementem głównym",
"tylko nad elementem głównym",
"nad i pod elementem głównym",
"tylko w pierwszym wierszu"
],
correct:2
},
{
q:"Które zdanie jest prawdziwe dla macierzy diagonalnej?",
answers:[
"Wszystkie elementy poza główną przekątną są równe jeden.",
"Wszystkie elementy poza główną przekątną są równe zero.",
"Wszystkie elementy na głównej przekątnej są równe zero.",
"Symetryczna względem głównej przekątnej."
],
correct:1
},
{
q:"Odwrotność macierzy A istnieje, jeśli:",
answers:[
"jest macierzą zerową",
"det(A) = 0",
"jest macierzą jednostkową",
"det(A) ≠ 0"
],
correct:3
},
{
q:"Mnożenie macierzy A przez B jest możliwe, gdy:",
answers:[
"liczba wierszy A = liczba kolumn B",
"liczba kolumn A = liczba kolumn B",
"liczba wierszy A = liczba wierszy B",
"liczba kolumn A = liczba wierszy B"
],
correct:3
},
{
q:"Po zakończeniu metody Gaussa–Jordana po lewej stronie macierzy rozszerzonej otrzymujemy najczęściej:",
answers:[
"macierz zerową",
"macierz jednostkową",
"macierz diagonalną",
"macierz transponowaną"
],
correct:1
}
];

/* shuffle */
function shuffle(q){
    let arr=q.answers.map((a,i)=>({text:a,id:i}));
    arr.sort(()=>Math.random()-0.5);
    q.shuffled=arr;
    q.newCorrect=arr.findIndex(a=>a.id===q.correct);
}
questions.forEach(q=>shuffle(q));

function load(){
    let q=questions[current];

    document.getElementById("question").innerText=q.q;
    ["a","b","c","d"].forEach((id,i)=>{
        document.getElementById(id).innerText=q.shuffled[i].text;
    });

    document.getElementById("money").innerText="Wygrana: "+money[current];
}

function answer(i){
    let q=questions[current];
    let correct=q.newCorrect;
    let ids=["a","b","c","d"];

    ids.forEach(id=>document.getElementById(id).onclick=null);

    document.getElementById(ids[correct]).classList.add("correct");

    if(i!==correct){
        document.getElementById(ids[i]).classList.add("wrong");
    }

    setTimeout(()=>{
        if(i===correct){
            current++;
            if(current<questions.length){
                reset(); load();
            } else{
                winGame();
            }
        } else{
            gameOver();
        }
    },1500);
}

function reset(){
    ["a","b","c","d"].forEach((id,i)=>{
        let el=document.getElementById(id);
        el.className="card";
        el.onclick=()=>answer(i);
        el.style.visibility="visible";
    });
}

/* 50/50 */
function use5050(){
    document.querySelector(".lifelines button:first-child").disabled=true;

    let q=questions[current];
    let correct=q.newCorrect;
    let arr=[0,1,2,3].filter(i=>i!==correct);

    for(let i=0;i<2;i++){
        let r=Math.floor(Math.random()*arr.length);
        document.getElementById(["a","b","c","d"][arr[r]]).style.visibility="hidden";
        arr.splice(r,1);
    }
}

/* telefon */
function friend(){
    document.querySelector(".lifelines button:last-child").disabled=true;
    let q=questions[current];
    alert("📞 Przyjaciel: "+["A","B","C","D"][q.newCorrect]);
}

/* PRZEGRANA */
function gameOver(){
    document.body.innerHTML=`<div class="end-screen sad">😢 KONIEC GRY 😢</div>`;

    for(let i=0;i<30;i++){
        let s=document.createElement("span");
        s.innerText="😢";
        s.style.left=Math.random()*100+"%";
        s.style.animationDuration=(4+Math.random()*4)+"s";
        document.body.appendChild(s);
    }
}

/* WYGRANA */
function winGame(){
    document.body.innerHTML=`
    <div class="end-screen">
        🎉 MILION ZDOBYTY! 🎉
        <div class="chest">💰</div>
    </div>`;

    setInterval(()=>{
        let f=document.createElement("div");
        f.classList.add("firework");
        f.style.left=Math.random()*100+"%";
        f.style.top=Math.random()*100+"%";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),1000);
    },150);
}

load();

</script>

</body>
</html>
