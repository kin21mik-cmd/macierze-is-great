<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Milionerzy</title>

<style>

/* TŁO */
body{
    margin:0;
    background:#001a66;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* LATAJĄCE $ */
.money-bg span{
    position:absolute;
    color:gold;
    font-size:25px;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}

/* GŁÓWNY EKRAN */
.main{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* TYTUŁ */
h1{
    font-size:80px;
    color:gold;
    margin-bottom:30px;
}

/* PYTANIE */
.question{
    font-size:35px;
    margin-bottom:40px;
    max-width:900px;
    text-align: center;
}

/* KAFELKI OGROMNE */
.answers{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:30px;
    width:80%;
    max-width: 1000px;
}

.card{
    height:150px;
    font-size:26px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#002bcc;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
    text-align: center;
    padding: 0 15px; /* Dodane, aby tekst nie przylegał do krawędzi */
}

.card:hover{
    background:#0055ff;
    transform:scale(1.05);
}

.correct{background:green !important;}
.wrong{background:red !important;}

.money{
    margin-top:30px;
    font-size:30px;
    color:gold;
}

/* KOŁA */
.lifelines button{
    padding:15px 30px;
    font-size:18px;
    margin:10px;
    background:orange;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color: white; /* Dodane dla lepszej czytelności */
}

</style>
</head>

<body>

<div class="money-bg"></div>

<div class="main">

<h1>💰 MILIONERZY 💰</h1>

<div class="lifelines">
<button onclick="use5050()">50/50</button>
<button onclick="friend()">📞 Przyjaciel</button>
</div>

<div class="question" id="question"></div>

<div class="answers">
<div id="a" class="card" onclick="answer(0)"></div>
<div id="b" class="card" onclick="answer(1)"></div>
<div id="c" class="card" onclick="answer(2)"></div>
<div id="d" class="card" onclick="answer(3)"></div>
</div>

<div class="money" id="money"></div>

</div>

<script>

/* LATAJĄCE $ */
for(let i=0;i<25;i++){
    let s=document.createElement("span");
    s.innerText="$";
    s.style.left=Math.random()*100+"%";
    s.style.animationDuration=(5+Math.random()*5)+"s";
    document.querySelector(".money-bg").appendChild(s);
}

/* GRA */

let current=0;

const money=[
"100 zł","200 zł","500 zł","1000 zł",
"2000 zł","5000 zł","10000 zł","50000 zł",
"100000 zł","500000 zł","1000000 zł"
];

const questions=[
{
q:"Metoda Sarrusa służy do:",
answers:["Gaussa","transpozycji","mnożenia","wyznacznika 3x3"],
correct:3
},
{
q:"Jeśli det ≠ 0 to macierz:",
answers:["ma ∞ rozwiązań","zerowa","jest odwracalna","losowa"],
correct:2
},
{
q:"Metoda Gaussa polega na:",
answers:[
"sprowadzaniu do postaci schodkowej",
"transpozycji",
"mnożeniu macierzy",
"wyznaczaniu det 2x2"
],
correct:0
},
{
q:"Twierdzenie Kroneckera-Capellego mówi o:",
answers:[
"transpozycji",
"macierzy zerowej",
"liczbie rozwiązań układu równań",
"wyznaczniku"
],
correct:2
},
{
q:"Układ ma jedno rozwiązanie gdy:",
answers:[
"zawsze",
"det = 0",
"rzędy = liczbie niewiadomych",
"brak równań"
],
correct:2
},
{
q:"Metoda Gaussa–Jordana prowadzi macierz do postaci:",
answers:[
"schodkowej zredukowanej",
"zerowej",
"diagonalnej",
"symetrycznej"
],
correct:0
},
{
q:"W metodzie Gaussa–Jordana zerujemy elementy:",
answers:[
"tylko pod elementem głównym",
"tylko nad elementem głównym",
"nad i pod elementem głównym",
"tylko w pierwszym wierszu"
],
correct:2
},
{
q:"Które zdanie jest prawdziwe dla macierzy diagonalnej?",
answers:[
"Wszystkie elementy poza główną przekątną są równe jeden.",
"Wszystkie elementy poza główną przekątną są równe zero.",
"Wszystkie elementy na głównej przekątnej są równe zero.",
"Symetryczna względem głównej przekątnej."
],
correct:1
},
{
q:"Odwrotność macierzy A istnieje, jeśli:",
answers:[
"jest macierzą zerową",
"det(A) = 0",
"jest macierzą jednostkową",
"det(A) ≠ 0"
],
correct:3
},
{
q:"Mnożenie macierzy A przez B jest możliwe, gdy:",
answers:[
"liczba wierszy A = liczba kolumn B",
"liczba kolumn A = liczba kolumn B",
"liczba wierszy A = liczba wierszy B",
"liczba kolumn A = liczba wierszy B"
],
correct:3
},
{
q:"Po zakończeniu metody Gaussa–Jordana po lewej stronie macierzy rozszerzonej otrzymujemy najczęściej:",
answers:[
"macierz zerową",
"macierz jednostkową",
"macierz diagonalną",
"macierz transponowaną"
],
correct:1
}
];

/* MIESZANIE ODPOWIEDZI */
function shuffle(q){
    // Tworzy mapę z oryginalnych odpowiedzi i ich indeksów
    let arr=q.answers.map((a,i)=>({text:a,id:i}));
    // Mieszanie kolejności odpowiedzi
    arr.sort(()=>Math.random()-0.5);
    q.shuffled=arr;
    // Znajduje nowy indeks dla poprawnej odpowiedzi po przemieszaniu
    q.newCorrect=arr.findIndex(a=>a.id===q.correct);
}

questions.forEach(q=>shuffle(q));

function load(){
    let q=questions[current];

    document.getElementById("question").innerText=q.q;

    document.getElementById("a").innerText="A. "+q.shuffled[0].text;
    document.getElementById("b").innerText="B. "+q.shuffled[1].text;
    document.getElementById("c").innerText="C. "+q.shuffled[2].text;
    document.getElementById("d").innerText="D. "+q.shuffled[3].text;

    document.getElementById("money").innerText="Wygrana: "+money[current];
}

function answer(i){
    let q=questions[current];
    let correct=q.newCorrect;
    let ids=["a","b","c","d"];

    // Blokuje możliwość kliknięcia innych odpowiedzi po wyborze
    ids.forEach((id,idx)=>{
        let el=document.getElementById(id);
        el.onclick=null;
    });

    // Podświetla poprawną odpowiedź na zielono
    document.getElementById(ids[correct]).classList.add("correct");

    // Jeśli wybrana odpowiedź nie jest poprawna, podświetla ją na czerwono
    if(i!==correct){
        document.getElementById(ids[i]).classList.add("wrong");
    }

    setTimeout(() => {
        if(i === correct){
            current++;
            if(current < questions.length){
                reset();
                load();
            } else {
                document.body.innerHTML="<h1>🎉 MILION ZDOBYTY!</h1>";
            }
        } else {
            document.body.innerHTML="<h1>❌ KONIEC GRY</h1>";
        }
    }, 1500); // Czas na podświetlenie odpowiedzi przed przejściem dalej
}

function reset(){
    ["a","b","c","d"].forEach((id,i)=>{
        let el=document.getElementById(id);
        el.classList="card"; // Resetuje klasy, usuwając 'correct'/'wrong'
        el.onclick=()=>answer(i); // Przywraca funkcję kliknięcia
        el.style.visibility="visible"; // Ustawia widoczność dla 50/50
    });
}

/* 50/50 */
function use5050(){
    // Wyłącza przycisk 50/50 po użyciu
    document.querySelector(".lifelines button:first-child").disabled = true;

    let q=questions[current];
    let correct=q.newCorrect;
    let removedCount=0;
    let possibleToRemove = [0, 1, 2, 3].filter(idx => idx !== correct); // Indeksy odpowiedzi do usunięcia

    // Losowo usuwa dwie błędne odpowiedzi
    while (removedCount < 2 && possibleToRemove.length > 0) {
        let randomIndex = Math.floor(Math.random() * possibleToRemove.length);
        let idToRemove = possibleToRemove[randomIndex];
        document.getElementById(["a","b","c","d"][idToRemove]).style.visibility="hidden";
        possibleToRemove.splice(randomIndex, 1); // Usuwa, żeby nie wylosować ponownie
        removedCount++;
    }
}

/* telefon */
function friend(){
    // Wyłącza przycisk Przyjaciel po użyciu
    document.querySelector(".lifelines button:last-child").disabled = true;

    let q=questions[current];
    // Symuluje, że przyjaciel zawsze zna poprawną odpowiedź
    alert("📞 Przyjaciel: Myślę, że poprawna odpowiedź to "+["A","B","C","D"][q.newCorrect]+".");
}

load(); // Ładuje pierwsze pytanie przy starcie
</script>

</body>
</html>
