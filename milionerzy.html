<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Milionerzy</title>

<style>

/* TŁO */
body{
    margin:0;
    background:#001a66;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* LATAJĄCE $ */
.money-bg span{
    position:absolute;
    color:gold;
    font-size:25px;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}

.main{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    font-size:80px;
    color:gold;
    margin-bottom:30px;
}

.question{
    font-size:35px;
    margin-bottom:40px;
    max-width:900px;
    text-align:center;
}

.answers{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    width:80%;
    max-width:1000px;
}

.card{
    height:150px;
    font-size:26px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#002bcc;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
    text-align:center;
    padding:0 15px;
}

.card:hover{
    background:#0055ff;
    transform:scale(1.05);
}

.correct{background:green!important;}
.wrong{background:red!important;}

.money{
    margin-top:30px;
    font-size:30px;
    color:gold;
}

.lifelines button{
    padding:15px 30px;
    font-size:18px;
    margin:10px;
    background:orange;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
}

/* EKRANY KOŃCOWE */
.end-screen{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:60px;
    text-align:center;
}

/* SMUTNE MINKI */
.sad span{
    position:absolute;
    font-size:30px;
    animation:sadFall linear infinite;
}
@keyframes sadFall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}

/* === NOWA SKRZYNIA ZE ZŁOTEM === */
.chest{
    width:180px;
    height:120px;
    background:linear-gradient(#5a3b00,#c99100);
    border-radius:10px;
    position:relative;
    margin-top:40px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
    border:4px solid #2b1a00;
}

/* pokrywa */
.chest::before{
    content:"";
    position:absolute;
    width:100%;
    height:70px;
    top:-55px;
    left:0;
    background:linear-gradient(#c99100,#5a3b00);
    border-radius:10px 10px 0 0;
    transform:rotateX(25deg);
}

/* metalowe okucia */
.chest::after{
    content:"";
    position:absolute;
    width:20px;
    height:40px;
    background:#999;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    border-radius:5px;
}

/* złoto */
.gold{
    position:absolute;
    top:-25px;
    left:50%;
    transform:translateX(-50%);
    font-size:45px;
    animation:goldPop 0.8s infinite alternate;
}

@keyframes goldPop{
    from{transform:translateX(-50%) scale(1);}
    to{transform:translateX(-50%) scale(1.3);}
}
/* === LEPSZE FAJERWERKI === */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
}

</style>
</head>

<body>

<div class="money-bg"></div>

<div class="main">
<h1>💰 MILIONERZY 💰</h1>

<div class="lifelines">
<button onclick="use5050()">50/50</button>
<button onclick="friend()">📞 Przyjaciel</button>
</div>

<div class="question" id="question"></div>

<div class="answers">
<div id="a" class="card" onclick="answer(0)"></div>
<div id="b" class="card" onclick="answer(1)"></div>
<div id="c" class="card" onclick="answer(2)"></div>
<div id="d" class="card" onclick="answer(3)"></div>
</div>

<div class="money" id="money"></div>
</div>

<script>

/* LATAJĄCE $ */
for(let i=0;i<25;i++){
    let s=document.createElement("span");
    s.innerText="$";
    s.style.left=Math.random()*100+"%";
    s.style.animationDuration=(5+Math.random()*5)+"s";
    document.querySelector(".money-bg").appendChild(s);
}

let current=0;

const money=[
"100 zł","200 zł","500 zł","1000 zł",
"2000 zł","5000 zł","10000 zł","50000 zł",
"100000 zł","500000 zł","1000000 zł"
];

/* TWOJE PYTANIA – NIE ZMIENIONE */
const questions=[
{
q:"Metoda Sarrusa służy do:",
answers:["Gaussa","transpozycji","mnożenia","wyznacznika 3x3"],
correct:3
},
{
q:"Jeśli det ≠ 0 to macierz:",
answers:["ma ∞ rozwiązań","zerowa","jest odwracalna","losowa"],
correct:2
},
{
q:"Metoda Gaussa polega na:",
answers:[
"sprowadzaniu do postaci schodkowej",
"transpozycji",
"mnożeniu macierzy",
"wyznaczaniu det 2x2"
],
correct:0
},
{
q:"Twierdzenie Kroneckera-Capellego mówi o:",
answers:[
"transpozycji",
"macierzy zerowej",
"liczbie rozwiązań układu równań",
"wyznaczniku"
],
correct:2
},
{
q:"Układ ma jedno rozwiązanie gdy:",
answers:[
"zawsze",
"det = 0",
"rzędy = liczbie niewiadomych",
"brak równań"
],
correct:2
},
{
q:"Metoda Gaussa–Jordana prowadzi macierz do postaci:",
answers:[
"schodkowej zredukowanej",
"zerowej",
"diagonalnej",
"symetrycznej"
],
correct:0
},
{
q:"W metodzie Gaussa–Jordana zerujemy elementy:",
answers:[
"tylko pod elementem głównym",
"tylko nad elementem głównym",
"nad i pod elementem głównym",
"tylko w pierwszym wierszu"
],
correct:2
},
{
q:"Które zdanie jest prawdziwe dla macierzy diagonalnej?",
answers:[
"Wszystkie elementy poza główną przekątną są równe jeden.",
"Wszystkie elementy poza główną przekątną są równe zero.",
"Wszystkie elementy na głównej przekątnej są równe zero.",
"Symetryczna względem głównej przekątnej."
],
correct:1
},
{
q:"Odwrotność macierzy A istnieje, jeśli:",
answers:[
"jest macierzą zerową",
"det(A) = 0",
"jest macierzą jednostkową",
"det(A) ≠ 0"
],
correct:3
},
{
q:"Mnożenie macierzy A przez B jest możliwe, gdy:",
answers:[
"liczba wierszy A = liczba kolumn B",
"liczba kolumn A = liczba kolumn B",
"liczba wierszy A = liczba wierszy B",
"liczba kolumn A = liczba wierszy B"
],
correct:3
},
{
q:"Po zakończeniu metody Gaussa–Jordana po lewej stronie macierzy rozszerzonej otrzymujemy najczęściej:",
answers:[
"macierz zerową",
"macierz jednostkową",
"macierz diagonalną",
"macierz transponowaną"
],
correct:1
}
];

function shuffle(q){
    let arr=q.answers.map((a,i)=>({text:a,id:i}));
    arr.sort(()=>Math.random()-0.5);
    q.shuffled=arr;
    q.newCorrect=arr.findIndex(a=>a.id===q.correct);
}
questions.forEach(q=>shuffle(q));

function load(){
    let q=questions[current];

    document.getElementById("question").innerText=q.q;
    ["a","b","c","d"].forEach((id,i)=>{
        document.getElementById(id).innerText=q.shuffled[i].text;
    });

    document.getElementById("money").innerText="Wygrana: "+money[current];
}

function answer(i){
    let q=questions[current];
    let correct=q.newCorrect;
    let ids=["a","b","c","d"];

    ids.forEach(id=>document.getElementById(id).onclick=null);

    document.getElementById(ids[correct]).classList.add("correct");

    if(i!==correct){
        document.getElementById(ids[i]).classList.add("wrong");
    }

    setTimeout(()=>{
        if(i===correct){
            current++;
            if(current<questions.length){
                reset(); load();
            } else{
                winGame();
            }
        } else{
            gameOver();
        }
    },1500);
}

function reset(){
    ["a","b","c","d"].forEach((id,i)=>{
        let el=document.getElementById(id);
        el.className="card";
        el.onclick=()=>answer(i);
        el.style.visibility="visible";
    });
}

/* 50/50 */
function use5050(){
    document.querySelector(".lifelines button:first-child").disabled=true;

    let q=questions[current];
    let correct=q.newCorrect;
    let arr=[0,1,2,3].filter(i=>i!==correct);

    for(let i=0;i<2;i++){
        let r=Math.floor(Math.random()*arr.length);
        document.getElementById(["a","b","c","d"][arr[r]]).style.visibility="hidden";
        arr.splice(r,1);
    }
}

/* telefon */
function friend(){
    document.querySelector(".lifelines button:last-child").disabled=true;
    let q=questions[current];
    alert("📞 Przyjaciel: "+["A","B","C","D"][q.newCorrect]);
}

/* PRZEGRANA */
function gameOver(){
    document.body.innerHTML=`<div class="end-screen sad">😢 KONIEC GRY 😢</div>`;

    for(let i=0;i<30;i++){
        let s=document.createElement("span");
        s.innerText="😢";
        s.style.left=Math.random()*100+"%";
        s.style.animationDuration=(4+Math.random()*4)+"s";
        document.body.appendChild(s);
    }
}

/* WYGRANA – LEPSZA */
function winGame(){
    document.body.innerHTML=`
    <div class="end-screen">
        🎉 MILION ZDOBYTY! 🎉
        <div class="chest">
            <div class="gold">🪙🪙🪙</div>
        </div>
    </div>`;

    setInterval(createFirework, 500);
}

function createFirework(){
    let x = Math.random()*window.innerWidth;
    let y = Math.random()*window.innerHeight/2;

    for(let i=0;i<25;i++){
        let p=document.createElement("div");
        p.className="particle";

        let angle=Math.random()*2*Math.PI;
        let speed=Math.random()*5+2;

        let dx=Math.cos(angle)*speed;
        let dy=Math.sin(angle)*speed;

        p.style.left=x+"px";
        p.style.top=y+"px";
        p.style.background=`hsl(${Math.random()*360},100%,50%)`;

        document.body.appendChild(p);

        let life=0;

        let interval=setInterval(()=>{
            life++;
            p.style.left=(p.offsetLeft+dx)+"px";
            p.style.top=(p.offsetTop+dy)+"px";
            p.style.opacity=1-life/30;

            if(life>30){
                clearInterval(interval);
                p.remove();
            }
        },30);
    }
}

load();

</script>
</body>
</html>
