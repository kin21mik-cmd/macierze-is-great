<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Milionerzy</title>

<style>
body{
    margin:0;
    background:#001f5c;
    color:white;
    font-family:Arial;
    text-align:center;
}

.main{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.question{
    font-size:30px;
    margin-bottom:40px;
    max-width:900px;
}

/* KAFELKI 2x2 */
.answers{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
    width:600px;
}

.card{
    padding:20px;
    font-size:20px;
    background:#002b80;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    background:#0040ff;
}

.correct{background:green !important;}
.wrong{background:red !important;}

.money{
    margin-top:30px;
    font-size:24px;
    color:gold;
}

.lifelines button{
    margin:5px;
    padding:10px 20px;
    background:orange;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="main">

<h1>💰 Milionerzy</h1>

<div class="lifelines">
<button onclick="use5050()">50/50</button>
<button onclick="friend()">📞 Przyjaciel</button>
</div>

<div class="question" id="question"></div>

<div class="answers">
<div id="a" class="card" onclick="answer(0)"></div>
<div id="b" class="card" onclick="answer(1)"></div>
<div id="c" class="card" onclick="answer(2)"></div>
<div id="d" class="card" onclick="answer(3)"></div>
</div>

<div class="money" id="money"></div>

</div>

<script>

let current=0;

const money=["100 zł","200 zł","500 zł","1000 zł",
"2000 zł","5000 zł","10000 zł","50000 zł",
"100000 zł","500000 zł","1000000 zł"];

// ✅ teraz poprawna odpowiedź NIE zawsze 0!
const questions=[
{
q:"Metoda Sarrusa służy do:",
answers:["liczenia wyznacznika 3x3","transpozycji","mnożenia","Gaussa"],
correct:0
},
{
q:"Jeśli det ≠ 0 to macierz:",
answers:["jest odwracalna","nie istnieje","jest zerowa","ma ∞ rozwiązań"],
correct:0
},
{
q:"Metoda Gaussa polega na:",
answers:[
"sprowadzaniu do postaci schodkowej",
"liczeniu pola",
"transpozycji",
"odwracaniu"
],
correct:0
},
{
q:"Twierdzenie Kroneckera-Capellego mówi o:",
answers:[
"liczbie rozwiązań układu",
"wyznacznikach",
"iloczynie",
"macierzy jednostkowej"
],
correct:0
},
{
q:"Układ ma jedno rozwiązanie gdy:",
answers:[
"rzędy macierzy są równe liczbie niewiadomych",
"det=0",
"brak równań",
"zawsze"
],
correct:0
}
];

// 🔥 LOSOWANIE odpowiedzi (miesza kolejność)
function shuffle(q){
    let arr = q.answers.map((a,i)=>({text:a,id:i}));
    arr.sort(()=>Math.random()-0.5);

    q.shuffled = arr;
    q.newCorrect = arr.findIndex(a=>a.id===q.correct);
}

questions.forEach(q=>shuffle(q));

function load(){
    let q=questions[current];

    document.getElementById("question").innerText=q.q;

    document.getElementById("a").innerText="A. "+q.shuffled[0].text;
    document.getElementById("b").innerText="B. "+q.shuffled[1].text;
    document.getElementById("c").innerText="C. "+q.shuffled[2].text;
    document.getElementById("d").innerText="D. "+q.shuffled[3].text;

    document.getElementById("money").innerText="Wygrana: "+money[current];
}

function answer(i){
    let q=questions[current];
    let correct=q.newCorrect;

    let ids=["a","b","c","d"];

    ids.forEach((id,idx)=>{
        let el=document.getElementById(id);

        if(idx===correct) el.classList.add("correct");

        el.onclick=null;
    });

    if(i!==correct){
        document.getElementById(ids[i]).classList.add("wrong");
    }

    setTimeout(()=>{
        if(i===correct){
            current++;
            if(current<questions.length){
                reset();
                load();
            } else {
                document.body.innerHTML="<h1>🎉 MILION!</h1>";
            }
        } else {
            document.body.innerHTML="<h1>❌ KONIEC GRY</h1>";
        }
    },1500);
}

function reset(){
    let ids=["a","b","c","d"];

    ids.forEach(id=>{
        let el=document.getElementById(id);
        el.classList="";
        el.onclick=()=>answer(ids.indexOf(id));
        el.style.visibility="visible";
    });
}

// ✅ 50/50
function use5050(){
    let q=questions[current];
    let correct=q.newCorrect;

    let removed=0;
    let ids=["a","b","c","d"];

    ids.forEach((id,i)=>{
        if(i!==correct && removed<2){
            document.getElementById(id).style.visibility="hidden";
            removed++;
        }
    });
}

// ✅ telefon
function friend(){
    let q=questions[current];
    alert("Przyjaciel mówi: chyba "+["A","B","C","D"][q.newCorrect]);
}

load();

</script>

</body>
</html>
