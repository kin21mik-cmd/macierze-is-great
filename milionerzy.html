<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Milionerzy</title>

<style>

/* TŁO */
body{
    margin:0;
    background:#001a66;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* LATAJĄCE $ */
.money-bg span{
    position:absolute;
    color:gold;
    font-size:25px;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}

/* GŁÓWNY EKRAN */
.main{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    font-size:80px;
    color:gold;
}

/* PYTANIE */
.question{
    font-size:35px;
    margin:40px;
    text-align:center;
}

.answers{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    width:80%;
    max-width:1000px;
}

.card{
    height:150px;
    font-size:26px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#002bcc;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
    text-align:center;
}

.card:hover{
    background:#0055ff;
    transform:scale(1.05);
}

.correct{background:green!important;}
.wrong{background:red!important;}

.money{
    margin-top:30px;
    font-size:30px;
    color:gold;
}

/* KOŁA RATUNKOWE */
.lifelines button{
    padding:15px 30px;
    margin:10px;
    background:orange;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* EKRANY KOŃCOWE */
.end-screen{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:60px;
    text-align:center;
}

/* SMUTNE MINKI */
.sad span{
    position:absolute;
    font-size:30px;
    animation:sadFall linear infinite;
}

@keyframes sadFall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}

/* FAJERWERKI */
.firework{
    position:absolute;
    width:10px;
    height:10px;
    background:yellow;
    border-radius:50%;
    animation:explode 1s forwards;
}

@keyframes explode{
    0%{transform:scale(1);}
    100%{transform:scale(8); opacity:0;}
}

/* SKRZYNIA */
.chest{
    font-size:100px;
    margin-top:30px;
}

</style>
</head>

<body>

<div class="money-bg"></div>

<div class="main">
<h1>💰 MILIONERZY 💰</h1>

<div class="question" id="question"></div>

<div class="answers">
<div id="a" class="card" onclick="answer(0)"></div>
<div id="b" class="card" onclick="answer(1)"></div>
<div id="c" class="card" onclick="answer(2)"></div>
<div id="d" class="card" onclick="answer(3)"></div>
</div>

<div class="money" id="money"></div>
</div>

<script>

/* LATAJĄCE $ */
for(let i=0;i<25;i++){
    let s=document.createElement("span");
    s.innerText="$";
    s.style.left=Math.random()*100+"%";
    s.style.animationDuration=(4+Math.random()*4)+"s";
    document.querySelector(".money-bg").appendChild(s);
}

/* DANE */
let current=0;

const money=["100","200","500","1000"];

const questions=[
{
q:"2+2=",
answers:["3","4","5","6"],
correct:1
},
{
q:"Stolica Polski?",
answers:["Berlin","Warszawa","Paryż","Rzym"],
correct:1
},
{
q:"HTML to?",
answers:["język programowania","język znaczników","baza danych","system"],
correct:1
},
{
q:"5*5=",
answers:["10","20","25","30"],
correct:2
}
];

/* LOSOWANIE */
function shuffle(q){
    let arr=q.answers.map((a,i)=>({text:a,id:i}));
    arr.sort(()=>Math.random()-0.5);
    q.shuffled=arr;
    q.newCorrect=arr.findIndex(a=>a.id===q.correct);
}

questions.forEach(q=>shuffle(q));

function load(){
    let q=questions[current];

    document.getElementById("question").innerText=q.q;
    ["a","b","c","d"].forEach((id,i)=>{
        document.getElementById(id).innerText=q.shuffled[i].text;
    });

    document.getElementById("money").innerText="Wygrana: "+money[current];
}

function answer(i){
    let q=questions[current];
    let correct=q.newCorrect;
    let ids=["a","b","c","d"];

    ids.forEach(id=>document.getElementById(id).onclick=null);

    document.getElementById(ids[correct]).classList.add("correct");

    if(i!==correct){
        document.getElementById(ids[i]).classList.add("wrong");
    }

    setTimeout(()=>{
        if(i===correct){
            current++;
            if(current<questions.length){
                reset(); load();
            } else{
                winGame();
            }
        } else{
            gameOver();
        }
    },1200);
}

function reset(){
    ["a","b","c","d"].forEach((id,i)=>{
        let el=document.getElementById(id);
        el.className="card";
        el.onclick=()=>answer(i);
    });
}

/* PRZEGRANA */
function gameOver(){
    document.body.innerHTML=
    `<div class="end-screen sad">😢 KONIEC GRY 😢</div>`;

    for(let i=0;i<30;i++){
        let s=document.createElement("span");
        s.innerText="😢";
        s.style.left=Math.random()*100+"%";
        s.style.animationDuration=(3+Math.random()*3)+"s";
        document.body.appendChild(s);
    }
}

/* WYGRANA */
function winGame(){
    document.body.innerHTML=
    `<div class="end-screen">
        🎉 MILION ZDOBYTY! 🎉
        <div class="chest">💰</div>
    </div>`;

    setInterval(()=>{
        let f=document.createElement("div");
        f.classList.add("firework");
        f.style.left=Math.random()*100+"%";
        f.style.top=Math.random()*100+"%";
        document.body.appendChild(f);

        setTimeout(()=>f.remove(),1000);
    },150);
}

load();

</script>

</body>
</html>
