<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Milionerzy</title>

<style>
body{
    margin:0;
    background:#001f5c;
    color:white;
    font-family:Arial;
    text-align:center;
}

/* CAŁY EKRAN */
.main{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* pytanie */
.question{
    font-size:30px;
    margin-bottom:40px;
    max-width:900px;
}

/* przyciski */
.answers{
    width:60%;
}

.answers button{
    width:100%;
    padding:15px;
    margin:10px 0;
    font-size:20px;
    background:#002b80;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.answers button:hover{
    background:#0040ff;
}

.correct{background:green !important;}
.wrong{background:red !important;}

/* koła ratunkowe */
.lifelines{
    margin-bottom:30px;
}

.lifelines button{
    margin:5px;
    padding:10px 20px;
    background:orange;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* pieniądze */
.money{
    margin-top:20px;
    font-size:24px;
    color:gold;
}
</style>
</head>

<body>

<div class="main">

<h1>💰 Milionerzy</h1>

<div class="lifelines">
<button onclick="use5050()">50/50</button>
<button onclick="callFriend()">📞 Przyjaciel</button>
</div>

<div class="question" id="question"></div>

<div class="answers">
<button id="a" onclick="answer(0)"></button>
<button id="b" onclick="answer(1)"></button>
<button id="c" onclick="answer(2)"></button>
<button id="d" onclick="answer(3)"></button>
</div>

<div class="money" id="money"></div>

</div>

<script>

let current = 0;

const moneyLevels = [
"100 zł","200 zł","500 zł","1000 zł",
"2000 zł","5000 zł","10000 zł","50000 zł",
"100000 zł","500000 zł","1000000 zł"
];

const questions = [
{
q:"Wyznacznik macierzy 3x3 liczymy metodą:",
answers:["Sarrusa","Newtona","Pitagorasa","Laplace tylko"],
correct:0
},
{
q:"Jeśli det ≠ 0 to macierz jest:",
answers:["odwracalna","zerowa","symetryczna","losowa"],
correct:0
},
{
q:"Metoda Gaussa służy do:",
answers:[
"rozwiązywania układów równań",
"mnożenia macierzy",
"transpozycji",
"wyznaczników 2x2"
],
correct:0
},
{
q:"Kronecker-Capelli mówi o:",
answers:[
"liczbie rozwiązań układu",
"wyznacznikach",
"transpozycji",
"iloczynie macierzy"
],
correct:0
},
{
q:"Układ ma jedno rozwiązanie gdy:",
answers:[
"rzędy macierzy są równe i = liczbie niewiadomych",
"det = 0",
"brak równań",
"zawsze"
],
correct:0
}
];

function load(){
    let q = questions[current];

    document.getElementById("question").innerText = q.q;
    document.getElementById("a").innerText = "A. " + q.answers[0];
    document.getElementById("b").innerText = "B. " + q.answers[1];
    document.getElementById("c").innerText = "C. " + q.answers[2];
    document.getElementById("d").innerText = "D. " + q.answers[3];

    document.getElementById("money").innerText =
    "Wygrana: " + moneyLevels[current];
}

function answer(i){
    let correct = questions[current].correct;

    let buttons = ["a","b","c","d"];

    for(let j=0;j<4;j++){
        let b = document.getElementById(buttons[j]);
        b.disabled = true;

        if(j===correct){
            b.classList.add("correct");
        }
    }

    if(i!==correct){
        document.getElementById(buttons[i]).classList.add("wrong");
    }

    setTimeout(()=>{
        if(i===correct){
            current++;

            if(current < questions.length){
                reset();
                load();
            }else{
                document.body.innerHTML="<h1>🎉 WYGRAŁEŚ MILION!</h1>";
            }
        }else{
            document.body.innerHTML="<h1>❌ KONIEC GRY</h1>";
        }
    },1500);
}

function reset(){
    let buttons=["a","b","c","d"];
    for(let i=0;i<4;i++){
        let b=document.getElementById(buttons[i]);
        b.disabled=false;
        b.classList="";
        b.style.visibility="visible";
    }
}

// ✅ 50/50
function use5050(){
    let correct = questions[current].correct;
    let removed = 0;

    let buttons = ["a","b","c","d"];

    for(let i=0;i<4;i++){
        if(i!==correct && removed<2){
            document.getElementById(buttons[i]).style.visibility="hidden";
            removed++;
        }
    }
}

// ✅ telefon
function callFriend(){
    let correct = questions[current].correct;
    alert("Przyjaciel mówi: chyba " + ["A","B","C","D"][correct]);
}

load();

</script>

</body>
</html>
