<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Milionerzy</title>

<style>

/* TŁO */
body{
    margin:0;
    background:#001a66;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* LATAJĄCE $ */
.money-bg span{
    position:absolute;
    color:gold;
    font-size:25px;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}

/* GŁÓWNY EKRAN */
.main{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* TYTUŁ */
h1{
    font-size:80px;
    color:gold;
    margin-bottom:30px;
}

/* PYTANIE */
.question{
    font-size:35px;
    margin-bottom:40px;
    max-width:900px;
}

/* KAFELKI OGROMNE */
.answers{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:30px;
    width:80%;
}

.card{
    height:150px;
    font-size:26px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#002bcc;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    background:#0055ff;
    transform:scale(1.05);
}

.correct{background:green !important;}
.wrong{background:red !important;}

.money{
    margin-top:30px;
    font-size:30px;
    color:gold;
}

/* KOŁA */
.lifelines button{
    padding:15px 30px;
    font-size:18px;
    margin:10px;
    background:orange;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="money-bg"></div>

<div class="main">

<h1>💰 MILIONERZY 💰</h1>

<div class="lifelines">
<button onclick="use5050()">50/50</button>
<button onclick="friend()">📞 Przyjaciel</button>
</div>

<div class="question" id="question"></div>

<div class="answers">
<div id="a" class="card" onclick="answer(0)"></div>
<div id="b" class="card" onclick="answer(1)"></div>
<div id="c" class="card" onclick="answer(2)"></div>
<div id="d" class="card" onclick="answer(3)"></div>
</div>

<div class="money" id="money"></div>

</div>

<script>

/* LATAJĄCE $ */
for(let i=0;i<25;i++){
    let s=document.createElement("span");
    s.innerText="$";
    s.style.left=Math.random()*100+"%";
    s.style.animationDuration=(5+Math.random()*5)+"s";
    document.querySelector(".money-bg").appendChild(s);
}

/* GRA */

let current=0;

const money=[
"100 zł","200 zł","500 zł","1000 zł",
"2000 zł","5000 zł","10000 zł","50000 zł",
"100000 zł","500000 zł","1000000 zł"
];

const questions=[
{
q:"Metoda Sarrusa służy do:",
answers:["wyznacznika 3x3","transpozycji","mnożenia","Gaussa"],
correct:0
},
{
q:"Jeśli det ≠ 0 to macierz:",
answers:["jest odwracalna","zerowa","losowa","ma ∞ rozwiązań"],
correct:0
},
{
q:"Metoda Gaussa polega na:",
answers:[
"sprowadzaniu do postaci schodkowej",
"transpozycji",
"wyznaczaniu det 2x2",
"mnożeniu macierzy"
],
correct:0
},
{
q:"Twierdzenie Kroneckera-Capellego mówi o:",
answers:[
"liczbie rozwiązań",
"macierzy zerowej",
"wyznaczniku",
"transpozycji"
],
correct:0
},
{
q:"Układ ma jedno rozwiązanie gdy:",
answers:[
"rzędy = liczbie niewiadomych",
"det=0",
"brak równań",
"zawsze"
],
correct:0
}
];

/* MIESZANIE ODPOWIEDZI */
function shuffle(q){
    let arr=q.answers.map((a,i)=>({text:a,id:i}));
    arr.sort(()=>Math.random()-0.5);
    q.shuffled=arr;
    q.newCorrect=arr.findIndex(a=>a.id===q.correct);
}

questions.forEach(q=>shuffle(q));

function load(){
    let q=questions[current];

    document.getElementById("question").innerText=q.q;

    document.getElementById("a").innerText="A. "+q.shuffled[0].text;
    document.getElementById("b").innerText="B. "+q.shuffled[1].text;
    document.getElementById("c").innerText="C. "+q.shuffled[2].text;
    document.getElementById("d").innerText="D. "+q.shuffled[3].text;

    document.getElementById("money").innerText="Wygrana: "+money[current];
}

function answer(i){
    let q=questions[current];
    let correct=q.newCorrect;
    let ids=["a","b","c","d"];

    ids.forEach((id,idx)=>{
        let el=document.getElementById(id);

        if(idx===correct) el.classList.add("correct");
        el.onclick=null;
    });

    if(i!==correct){
        document.getElementById(ids[i]).classList.add("wrong");
    }

    setTimeout(()=>{
        if(i===correct){
            current++;
            if(current<questions.length){
                reset();
                load();
            }else{
                document.body.innerHTML="<h1>🎉 MILION ZDOBYTY!</h1>";
            }
        }else{
            document.body.innerHTML="<h1>❌ KONIEC GRY</h1>";
        }
    },1500);
}

function reset(){
    ["a","b","c","d"].forEach((id,i)=>{
        let el=document.getElementById(id);
        el.classList="card";
        el.onclick=()=>answer(i);
        el.style.visibility="visible";
    });
}

/* 50/50 */
function use5050(){
    let q=questions[current];
    let correct=q.newCorrect;
    let removed=0;

    ["a","b","c","d"].forEach((id,i)=>{
        if(i!==correct && removed<2){
            document.getElementById(id).style.visibility="hidden";
            removed++;
        }
    });
}

/* telefon */
function friend(){
    let q=questions[current];
    alert("Przyjaciel: myślę że "+["A","B","C","D"][q.newCorrect]);
}

load();

</script>

</body>
</html>
